<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>拟物态时钟 - Demo 01</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="clock-container">
      <div class="clock">
        <div class="center-nut"></div>

        <div class="hand hour-hand" id="hourHand"></div>
        <div class="hand min-hand" id="minHand"></div>
        <div class="hand sec-hand" id="secHand"></div>

        <div class="number n12">12</div>
        <div class="number n3">3</div>
        <div class="number n6">6</div>
        <div class="number n9">9</div>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
